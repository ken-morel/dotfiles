general {
    # What to run when a lock request is received (manual or system-triggered)
    lock_cmd = hyprlock

    # RECOMMENDED: Lock screen before the system goes to sleep
    before_sleep_cmd =  loginctl lock-session
}

listener {
    timeout = 300                                # 5 minutes
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
