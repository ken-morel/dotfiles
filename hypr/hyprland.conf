# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}





# --- hy3 Tiling Controls ---

# Split Horizontally (Next window opens to the right)
# bind = $mainMod CTRL, l, hy3:makegroup, h

# Split Vertically (Next window opens below)
# bind = $mainMod CTRL, j, hy3:makegroup, v

# Create Tabs (Turns current group into a tabbed layout)
bind = $mainMod, T, hy3:makegroup, tab
# bind = $mainMod, T, togglegroup

bind = $mainMod, TAB, changegroupactive, +1

# Return to automatic/default tiling (Untab/Ungroup)
bind = $mainMod, U, hy3:changegroup, opposite

# --- Navigation (Vim-style or Arrow keys) ---
bind = $mainMod, H,          hy3:movefocus, l
bind = $mainMod, L,          hy3:movefocus, r
bind = $mainMod, K,          hy3:movefocus, u
bind = $mainMod, J,          hy3:movefocus, d

# --- Window Movement ---
bind = $mainMod SHIFT, H,    hy3:movewindow, l
bind = $mainMod SHIFT, L,    hy3:movewindow, r
bind = $mainMod SHIFT, K,    hy3:movewindow, u
bind = $mainMod SHIFT, J,    hy3:movewindow, d


