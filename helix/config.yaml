theme: ama
editor:
  true-color: true
  undercurl: true
  idle-timeout: 1000
  auto-format: true
  line-number: relative
  mouse: false
  shell:
  - nu
  - --stdin
  - -c
  rulers:
  - 80
  - 100
  color-modes: true
  gutters:
  - diff
  - diagnostics
  - line-numbers
  - spacer
  scrolloff: 5
  rainbow-brackets: true
  default-yank-register: '"'
  middle-click-paste: false
  scroll-lines: 0
  completion-trigger-len: 2
  cursorline: true
  cursorcolumn: true
  trim-final-newlines: true
  trim-trailing-whitespace: true
  popup-border: all
  jump-label-alphabet: jklmasdfghwobceinpqrtuvxyz
  insert-final-newline: false
  soft-wrap:
    enable: false
    max-wrap: 25
    max-indent-retain: 0
    wrap-indicator: '>'
  word-completion:
    enable: true
    trigger-length: 2
  statusline:
    left:
    - mode
    - spinner
    - position
    - selections
    - register
    center:
    - file-indent-style
    - version-control
    - file-name
    - diagnostics
    - total-line-numbers
    right:
    - workspace-diagnostics
    - file-modification-indicator
    - file-encoding
    - file-line-ending
    - file-type
    - mode
    separator: ┊
    mode:
      normal: ' /\ '
      insert: ' || '
      select: ' \/ '
    diagnostics:
    - warning
    - error
    - hint
    workspace-diagnostics:
    - warning
    - error
    - hint
  auto-save:
    focus-lost: true
    after-delay:
      enable: true
      timeout: 60000
  lsp:
    display-inlay-hints: true
    display-progress-messages: true
  buffer-picker:
    start-position: current
  auto-pairs:
    (: )
    '{': '}'
    '[': ']'
    '"': '"'
    '`': '`'
    '''': ''''
  whitespace:
    render:
      space: all
      tab: all
      nbsp: all
      nnbsp: all
      newline: none
    characters:
      space: ·
      nbsp: ⍽
      nnbsp: ␣
      tab: →
      newline: ⏎
      tabpad: ' '
  indent-guides:
    render: true
    character: ╎
    skip-levels: 1
  inline-diagnostics:
    cursor-line: hint
keys:
  normal:
    C-p: :insert-output open --raw ~/.txt
    C-y: :pipe-to save --force ~/.txt
    C-r: :pipe open --raw ~/.txt
    A-l: jump_view_right
    A-h: jump_view_left
    A-j: jump_view_down
    A-k: jump_view_up
    j: move_visual_line_down
    k: move_visual_line_up
    V:
    - goto_first_nonwhitespace
    - extend_to_line_end
    x: extend_line
    L: extend_to_line_end
    H: extend_to_first_nonwhitespace
    n: search_next
    N: search_prev
    +: increment
    '-': decrement
    A-,: remove_primary_selection
    W: '@miW'
    w: '@miw'
    ret:
    - move_line_down
    - goto_first_nonwhitespace
    A-ret:
    - move_line_up
    - goto_first_nonwhitespace
    A-backspace:
      r:
      - :config-reload
      - :reload-all
      o: :config-open
      l: :o ~/.config/helix/languages.toml
    A-space:
      j: :pipe julia --startup-file=no
      s: :pipe respell-en
      a: :insert-output realpath %(selection)
      r: :insert-output cat %(selection)
    g:
      g:
      - goto_file_start
      f:
      - goto_file
      h:
      - goto_line_start
      l:
      - goto_line_end
    space:
      /:
      - save_selection
      - global_search
      b:
      - save_selection
      - buffer_picker
      B: :sh git blame -L %{cursor_line},+1 %{buffer_name}
      q: :bc
      V: vsplit
      H: hsplit
      .: file_explorer_in_current_buffer_directory
      E: no_op
      f:
      - save_selection
      - file_picker_in_current_directory
      F:
      - save_selection
      - file_picker_in_current_buffer_directory
    backspace:
      Y:
      - :sh rm -f /tmp/unique-file
      - :insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file
      - :sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty
      - :open %sh{cat /tmp/unique-file}
      - :redraw
      y:
      - :sh rm -f /tmp/unique-file
      - :insert-output yazi --chooser-file=/tmp/unique-file
      - :sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty
      - :open %sh{cat /tmp/unique-file}
      - :redraw
      g:
      - :write-all
      - :new
      - :insert-output lazygit
      - :buffer-close!
      - :redraw
      - :reload-all
      s:
      - :write-all
      - :insert-output fish -c 'serpl >/dev/tty'
      - :redraw
      - :reload-all
      r: :rl
      w: :write
    '@':
      m:
        t:
          l: '@mip<A-s>gs'
          a: '@lt|l&'
          h: '@f-f ;lt|dF-;pr-'
  select:
    ;:
    - collapse_selection
    - normal_mode
    x:
    - extend_line
    V:
    - extend_to_line_end
    L:
    - goto_line_end
    H:
    - goto_first_nonwhitespace
    n:
    - extend_search_next
    N:
    - extend_search_prev
    g:
      e: extend_to_file_end
    C-y: :pipe-to save --force ~/.txt
    C-r: :pipe open --raw ~/.txt
    C-p: :insert-output open --raw ~/.txt
    A-space:
      s: '@|respell-en'
  insert:
    A-l: move_char_right
    A-h: move_char_left
    A-k: open_above
    A-j: open_below
    A-s:
    - :insert-output select-symbol
    - move_char_right
    - collapse_selection
    A-i:
      r: :append-output git remote get-url origin
    A-f:
      d:
      - :insert-output fd -t d | fzf --prompt '📁 Directories › ' --header 'Select a directory (↑↓ navigate, Enter confirm, Esc cancel)' --preview 'eza -lah --icons --color=always --group-directories-first {}' --preview-window 'right:60%%' --border --height 80%%
      - :redraw
      f:
      - :insert-output fd -t f | fzf --prompt '📄 Files › ' --header 'Select a file (↑↓ navigate, Enter confirm, Esc cancel)' --preview 'bat --style=numbers --color=always {}' --preview-window 'right:60%%' --border --height 80%%
      - :redraw
