# ------------------------------ spell chacking

[[language]]
name = "markdown"
formatter = { command = "dprint", args = ["fmt", "--stdin", "md"] }

indent = { tab-width = 2, unit = "  " }

language-servers = ["typos", "wakatime", "lsp-ai"]
# iwes
auto-format = true
soft-wrap.enable = true

[language-server.codebook-lsp]
command = "codebook-lsp"
args = ["serve"]

[language-server.iwes]
command = "iwes"
args = []

[language-server.buffer-language-server]
command = "buffer-language-server"

[[language]]
name = "protobuf"
language-servers = [
  "typos",
  "copilot-lsp",
  "buffer-language-server",
  "buf",
  "pbkit",
  "protols",
  "wakatime",
  "lsp-ai",
]
auto-format = true

# ------------------------------------------ rust

[[language]]
name = "rust"
language-servers = [
  "typos",
  "copilot-lsp",
  "rust-analyzer",
  "wakatime",
  "lsp-ai",
]
auto-format = true
formatter = { command = "rustfmt", args = [
  "--edition",
  "2024",
  "--style-edition",
  "2024",
] }

[language-server.rust-analyzer.config]
ckeck = { command = "clippy" }

[language-server.typos]
command = "typos-lsp"
environment = { "RUST_LOG" = "error" }

[language-server.typos.config.typos] # BUG
diagnosticSeverity = "Hint" # ["Error", "Warning", "Information", "Hint"]
logLevel = "info"           # ["off", "error", "warn", "info", "debug", "trace"]


[[language]]
name = "zig"
language-servers = ["zls", "lsp-ai", "wakatime", "typos"]

[language-server.lsp-ai]
command = "lsp-ai"

#required
[language-server.lsp-ai.config.memory.file_store]

[language-server.lsp-ai.config.models.qwompleter]
type = "open_ai"
completions_endpoint = "http://localhost:3235/v1/completions"
model = ""
auth_token = "amemimy"

[[language-server.lsp-ai.config.actions]]
parameters = { max_context = 4096, max_tokens = 64, temperature = 0.0, stop = [
  "<|file_separator|>",
  "<|fim_prefix|>",
  "<|fim_suffix|>",
  "<|fim_middle|>",
  "\n\n",
  "|\n",
], fim = { start = "<|fim_prefix|>", middle = "<|fim_suffix|>", end = "<|fim_middle|>" } }
action_display_name = "qwomplete"
model = "qwompleter"
