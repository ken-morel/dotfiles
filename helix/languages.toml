# -------------------------------------------- wakatime
[language-server.wakatime]
command = "wakatime-ls"

[[language]]
name = "slint"
auto-format = true
formatter = { command = "slint-lsp", args = ["format", "/dev/stdin"] }
language-servers = [
  "slint-lsp",
  "lsp-ai",
  "wakatime",
  "fs-watcher",
  "typos",
  "copilot-lsp",
  "codebook-lsp",
]

# -------------------------------------------- julia
[[language]]
name = "julia"
auto-format = true
formatter = { command = "runic" }
language-servers = [
  "jetls",
  "relint",
  "lsp-ai",
  "wakatime",
  "typos",
  "copilot-lsp",
  "codebook-lsp",
  "fs-watcher",
]

[language-server.jetls]
command = "jetls"
args = ["--threads=auto", "--"]
timeout = 180

[language-server.relint]
command = "/home/engon/bin/relint"

# -------------------------------------------- toml

[[language]]
name = "toml"
roots = ["."]
language-servers = [
  "typos",
  "copilot-lsp",
  "taplo",
  "wakatime",
  "codebook-lsp",
  "fs-watcher",
  "dprint",
]

auto-format = true

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

[language-server.dprint]
command = "dprint"
args = ["lsp"]

# -------------------------------------------- v
[[language]]
name = "v"
file-types = [{ glob = "*.v" }]
language-servers = [
  "v-analyzer",
  "lsp-ai",
  "wakatime",
  "typos",
  "copilot-lsp",
  "codebook-lsp",
  "fs-watcher",
]
formatter = { command = "v", args = ["fmt", "-w"] }
auto-format = true
shebangs = ["v"]

[language-server.vls]
command = "/usr/bin/vls"
[language-server.v-analyzer]
command = "/home/engon/apps/v-analyzer/bin/v-analyzer"

