# ---------------------------------------------  python

[[language]]
name = "python"
language-servers = [
  "pyright",
  "ruff",
  "lsp-ai",
  "typos",
  "copilot-lsp",
  "wakatime",
  "fs-watcher",
  "codebook-lsp",
]
auto-format = true
[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"
[language-server.ruff]
command = "ruff"
args = ["server"]
[language-server.pylyzer]
command = "pylyzer"
args = ["--server"]

# ----------------------------------------------- dart
[[language]]
name = "dart"
language-servers = [
  "typos",
  "copilot-lsp",
  "dart",
  "wakatime",
  "codebook-lsp",
  "fs-watcher",
  "lsp-ai",
]
auto-format = true

[language.debugger]
name = "dart"
transport = "stdio"
command = "flutter"
args = ["debug-adapter"]

[[language.debugger.templates]]
name = "launch"
request = "launch"
completion = [
  { name = "entrypoint", completion = "filename", default = "lib/main.dart" },
]
args = { program = "{0}" }

[[language]]
name = "efus"
scope = "source.efus"
file-types = ["efus"]
comment-token = "#"
grammar = "efus" # This name must match the grammar section below
language-servers = [
  "typos",
  "copilot-lsp",
  "wakatime",
  "codebook-lsp",
  "fs-watcher",
  "lsp-ai",
]

[[language]]
name = "fish"
language-servers = [
  "typos",
  "copilot-lsp",
  "fish-lsp",
  "wakatime",
  "codebook-lsp",
  "fs-watcher",
  "lsp-ai",
]
auto-format = true

[[language]]
file-types = [{ glob = "*.h" }, { glob = "*.c" }, { glob = "*.h" }]
name = "c"
language-servers = [
  "lsp-ai",
