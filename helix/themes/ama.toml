inherits = "sunset"

# "ui.popup" = { fg = "text", bg = "block" } # <-- CHANGED THIS LINE

"ui.background" = { bg = "background" }
"ui.background.separator" = { fg = "g_10", bg="background" }
"ui.gutter" = { bg = "base" }
"ui.gutter.selected" = { bg = "pitch_black" }
"ui.linenr" = { fg = "slate_gray" }
"ui.linenr.selected" = { fg = "blaze_orange", modifiers = ["bold"] }


"keyword.operator" = "orange_blaze"
"keyword.directive" = { fg = "red_ember", modifiers = ["italic"] }
"keyword.storage.modifier" = { fg = "red_ember", modifiers = ["italic"] }




# from sunset.toml
"variable.builtin"   = { fg = "sky", modifiers = ["italic"] }
"variable.builtin.mutable" = { fg = "sky", modifiers = ["italic", "bold"]}
"variable.parameter" = { fg="rose" }
"variable.parameter.mutable" = { fg="rose", modifiers= ["bold"] }
"variable" = "text"
"variable.mutable" = { modifiers = ["bold"] }
"variable.other.member" = "pink"
# /sunset.toml


## from ao.toml
#
# MARKUP, SYNTAX HIGHLIGHTING AND INTERFACE HYBRID
"markup.heading" = { fg = "blaze_orange" }
"markup.heading.marker"  = { fg = "crystal_blue", modifiers = ["bold"] }
"markup.heading.1" = { fg = "crystal_blue", modifiers = ["bold"] }
"markup.heading.2" = { fg = "sky_blue", modifiers = ["bold"] }
"markup.heading.3" = { fg = "dreamy_blue", modifiers = ["bold"] }
"markup.heading.4" = { fg = "crystal_blue" }
"markup.heading.5" = { fg = "sky_blue" }
"markup.heading.6" = { fg = "dreamy_blue" }
"markup.list" = { fg = "blaze_orange" }
"markup.bold" = { fg = "crystal_blue", modifiers = ["bold"] }
"markup.italic" = { fg = "crystal_blue", modifiers = ["italic"] }
"markup.strikethrough" = { fg = "crystal_blue", modifiers = ["crossed_out"] }
"markup.link" = { fg = "crystal_blue", underline = { color = "light_purple", style = "line" } }
"markup.link.url" = { fg = "slate_purple", underline = { color = "slate_purple", style = "line" } }
"markup.link.label" = { fg = "crystal_blue" }
"markup.link.text" = { fg = "crystal_blue", modifiers = ["bold"] }
"markup.quote" = { fg = "winter_sky", modifiers = ["italic"] }
"markup.raw" = { fg = "winter_sky", bg="t1" }
"markup.raw.block" = { fg = "winter_sky", bg="t1" }

##

# User Interface
# --------------

"ui.statusline" = { fg = "g_2", bg = "g_9" }
"ui.statusline.inactive" = { fg = "g_5", bg = "g_10" }
"ui.statusline.normal" = { fg = "background", bg = "orange_blaze", modifiers = [
  "bold",
] }
"ui.statusline.insert" = { fg = "g_1", bg = "g_7", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "background", bg = "orange_golden", modifiers = [
  "bold",
] }


"ui.popup" = { fg = "text", bg = "g_10" }
"ui.info" = { fg = "orange_blaze", bg = "g_10" }
"ui.window" = { fg = "g_7" }
"ui.help" = { fg = "text", bg = "g_10", modifiers = ["bold"] }
"ui.bufferline.active" = { fg = "g_3", bg = "t5" }
"ui.bufferline" = { fg = "g_1", bg = "t2" }

"ui.text" = "text"
"ui.text.focus" = { fg = "g_2", bg = "g_10", underline = { color = "red_ember", style = "line" }, modifiers = [
  "bold",
] }
"ui.text.inactive" = { fg = "g_7" }
"ui.text.directory" = { fg = "red_ember" }

"ui.virtual" = "g_5"
"ui.virtual.ruler" = { bg = "t1" }
"ui.virtual.whitespace" = "g_7"
"ui.virtual.indent-guide" = "g_7"
# "ui.virtual.wrap" = "g_7"
"ui.virtual.inlay-hint" = { fg = "orange_blaze", modifiers = ["italic"] }
"ui.virtual.jump-label" = { fg = "background", bg = "orange_blaze", modifiers = [
  "bold",
] }
"ui.virtual.inlay-hint.parameter" = { fg = "walnut_brown" }
"ui.virtual.inlay-hint.type" = { fg = "slate_gray" }
"ui.virtual.wrap" = { fg = "deep_purple" }


"ui.selection" = { bg = "brown_dark" }
# # ao.toml
"ui.cursor.normal" = { fg = "winter_sky", bg = "twilight_blue" }                                     # slave cursor block in normal mode
"ui.cursor.insert" = { bg = "rustic_red" }                                                           # slave cursor block in insert mode
"ui.cursor.select" = { bg = "deep_purple" }                                                          # slave cursor block in select mode
"ui.cursor.match" = { fg = "deep_abyss", bg = "t4"}                # matching bracket etc
"ui.cursor.primary.normal" = { fg = "deep_abyss", bg = "sky_blue" }                                  # cursor block in normal mode
"ui.cursor.primary.insert" = { fg = "deep_abyss", bg = "ruby_glow" }                                 # cursor block in insert mode
"ui.cursor.primary.select" = { fg = "winter_sky", bg = "deep_purple" }                               # cursor block in select mode (not the selected color)
# #/ao.toml


"ui.cursorline.primary" = { bg = "g_10" }
"ui.cursorline" = { bg = "g_12" }

"ui.highlight" = { fg = "orange_blaze", bg = "cursorline", underline = { color = "red_ember", style = "line" }, modifiers = [
  "bold",
] }

# "ui.menu" = { fg = "g_2", bg = "g_10" }
"ui.menu.selected" = { fg = "background", bg = "orange_blaze", modifiers = [
  "bold",
] }

"diagnostic.error" = { underline = { color = "red_flame", style = "line" } }
"diagnostic.warning" = { underline = { color = "orange_golden", style = "line" } }
# "diagnostic.info" = { underline = { color = "g_4", style = "line" } }
# "diagnostic.hint" = { underline = { color = "g_5", style = "line" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

error = { fg = "red_flame" }
warning = { fg = "orange_golden" }
info = { fg = "blue" }
hint = { fg = "dark_blue" }

