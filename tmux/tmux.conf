# Prefix + R + V: Start Video Only
bind-key -T prefix M-r switch-client -T recording
bind-key -T recording v run-shell -b "nu ~/.config/bin/record-drm video" \; display "Recording Video..."
# Prefix + R + A: Start Video + Audio
bind-key -T recording a run-shell -b "nu ~/.config/bin/record-drm audio-video" \; display "Recording Full Media..."
# Prefix + R + S: Start Sound Only
bind-key -T recording s run-shell -b "nu ~/.config/bin/record-drm audio" \; display "Recording Audio Only..."
# Prefix + R + X: Stop Recording (Kills ffmpeg)
bind-key -T recording x run-shell "nu ~/.config/bin/record-drm stop" \; display "Recording Saved."
# Prefix + R + P: Screenshot (Single frame PNG)
bind-key -T recording p run-shell "nu ~/.config/bin/record-drm screenshot" \; display "Screenshot Saved."



# 1. Best TERM for tmux (gives proper key definitions, 256 colours, etc.)
set -g default-terminal "tmux-256color"

# 2. Enable the modern extended key protocol (this is the big one for Tab vs C-i, C-1..C-9, Ctrl+., etc.)
set -s extended-keys on

# 3. Tell tmux your outer terminal supports it (adjust the pattern if your TERM is not xterm*)
#    The comma at the start makes it additive.
set -as terminal-features ",*:extkeys"

# 4. Legacy compatibility (harmless and still useful on older tmux or some terminals)
set -g xterm-keys on

# 5. Other very common fixes for "weird key behaviour"
set -sg escape-time 10      # no delay when pressing Esc in Vim/Neovim
set -g focus-events on      # lets programs know when pane gains/loses focus
set -g mouse on             # mouse support (scrolling, pane selection, etc.)

set -g lock-after-time 600
set -g lock-command "nu /home/engon/.config/bin/term-lock-anim; vlock"
# bind CA-l lock-session
#
#
# Force renumbering of windows when one is closed
set-option -g renumber-windows on

set-option -g default-shell /usr/bin/nu



 # Ken Morel Engon's Custom TMUX Configuration
# -------------------------------------------

# --- General Settings ---
# Set the default terminal to support 256 colors and True Color
set-option -sag terminal-overrides ",xterm*:Tc"
# set-option -sag terminal-overrides ",kmscon:Tc"

# Set a much longer history limit
set -g history-limit 50000

# Set the base index for windows and panes to 1, making them easier to select
set -g base-index 1
setw -g pane-base-index 1



# Reload config with r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# Session switching: Win+N / Alt+N (no prefix)

bind-key -n M-1 switch-client -t terminals
bind-key -n M-2 switch-client -t editors
bind-key -n M-3 switch-client -t browsers
bind-key -n M-4 switch-client -t socials
bind-key -n M-5 switch-client -t files
bind-key -n M-6 switch-client -t monitors
bind-key -n M-7 switch-client -t dev
bind-key -n M-8 switch-client -t llms
bind-key -n M-9 switch-client -t logs


